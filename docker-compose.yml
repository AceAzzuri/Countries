services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ballers_club
      POSTGRES_USER: ballers_club
      POSTGRES_PASSWORD: ballers_club
    ports:
      - "5432:5432"
    volumes:
      - ballers_club_postgres:/var/lib/postgresql/data

volumes:
  ballers_club_postgres:
